<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>どこでも推し撮影AR</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

#video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#overlay {
  position: absolute;
  width: 150px;
  top: 100px;
  left: 100px;
  cursor: grab;
}

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 10px;
  color: white;
}
</style>

</head>
<body>

<!-- カメラ -->
<video id="video" autoplay playsinline></video>

<!-- 重ねる画像 -->
<img id="overlay">

<!-- UI -->
<div id="ui">
  <input type="file" id="file"><br>
  サイズ：<input type="range" id="size" min="50" max="1000" value="150"><br>
  <button onclick="capture()">撮影</button>
</div>

<!-- 合成用 -->
<canvas id="canvas" style="display:none;"></canvas>

  影：<input type="range" id="shadow" min="0" max="50" value="10"><br>
ぼかし：<input type="range" id="blur" min="0" max="50" value="10"><br>
  
<script>
// =========================
// 要素取得
// =========================
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const sizeSlider = document.getElementById("size");
const shadowSlider = document.getElementById("shadow");
const blurSlider = document.getElementById("blur");

function updateShadow(){
  const s = shadowSlider.value;
  const b = blurSlider.value;

  overlay.style.filter = `drop-shadow(${s}px ${s}px ${b}px rgba(0,0,0,0.5))`;
}

shadowSlider.addEventListener("input", updateShadow);
blurSlider.addEventListener("input", updateShadow);
// =========================
// ① 外カメラ起動
// =========================
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { exact: "environment" } }
})
.then(stream => video.srcObject = stream)
.catch(() => {
  // fallback
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  }).then(stream => video.srcObject = stream);
});

// =========================
// ② 画像選択
// =========================
document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  overlay.src = URL.createObjectURL(file);
});

// =========================
// ③ サイズ変更
// =========================
sizeSlider.addEventListener("input", () => {
  overlay.style.width = sizeSlider.value + "px";
});

// =========================
// ④ ドラッグ（PC）
// =========================
let isDragging = false;
let offsetX = 0;
let offsetY = 0;

overlay.addEventListener("mousedown", e => {
  isDragging = true;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
});

document.addEventListener("mousemove", e => {
  if (!isDragging) return;
  overlay.style.left = (e.clientX - offsetX) + "px";
  overlay.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

// =========================
// ⑤ ドラッグ（スマホ）
// =========================
overlay.addEventListener("touchstart", e => {
  const touch = e.touches[0];
  const rect = overlay.getBoundingClientRect();

  offsetX = touch.clientX - rect.left;
  offsetY = touch.clientY - rect.top;

  isDragging = true;
});

document.addEventListener("touchmove", e => {
  if (!isDragging) return;

  const touch = e.touches[0];

  overlay.style.left = (touch.clientX - offsetX) + "px";
  overlay.style.top = (touch.clientY - offsetY) + "px";
});

document.addEventListener("touchend", () => {
  isDragging = false;
});

// =========================
// ⑥ 撮影（ズレ修正あり）
// =========================
function capture(){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const videoRect = video.getBoundingClientRect();
  const overlayRect = overlay.getBoundingClientRect();

  // ===== 9:16 固定 =====
  const width = 1080;
  const height = 1920;

  canvas.width = width;
  canvas.height = height;

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  // ===== カメラを9:16で中央トリミング =====
  const targetRatio = width / height;
  const videoRatio = vw / vh;

  let sx, sy, sw, sh;

  if (videoRatio > targetRatio) {
    // 横長 → 左右カット
    sh = vh;
    sw = vh * targetRatio;
    sx = (vw - sw) / 2;
    sy = 0;
  } else {
    // 縦長 → 上下カット
    sw = vw;
    sh = vw / targetRatio;
    sx = 0;
    sy = (vh - sh) / 2;
  }

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, width, height);

  // ===== overlayの位置補正 =====
  const scaleX = width / videoRect.width;
  const scaleY = height / videoRect.height;

  ctx.globalAlpha = overlay.style.opacity || 1;

  ctx.drawImage(
    overlay,
    (overlayRect.left - videoRect.left) * scaleX,
    (overlayRect.top - videoRect.top) * scaleY,
    overlay.width * scaleX,
    overlay.height * scaleY
  );

  ctx.globalAlpha = 1;

  const link = document.createElement("a");
  link.download = "ar_9_16.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
